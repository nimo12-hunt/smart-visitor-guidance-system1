<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MINT Navigator - Ministry of Innovation & Technology</title>

    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          {
            pageLanguage: "en",
            includedLanguages: "en,am,om,so,ti",
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
            // CRITICAL: Stop Google from guessing the language
            autoDisplay: false,
            multilanguagePage: true,
          },
          "google_translate_element",
        );
      }
    </script>

    <script
      type="text/javascript"
      src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"
    ></script>

    <style>
      /* CRITICAL: This CSS kills the Google "Ugly" parts 
         but keeps the translation engine alive.
      */

      /* Hide the white top banner that says "Translated to..." */
      .goog-te-banner-frame.skiptranslate {
        display: none !important;
      }

      /* Hide the Google Branding logo and text */
      .goog-logo-link,
      .goog-te-gadget span {
        display: none !important;
      }

      /* Hide the gadget container but keep the combo functional */
      .goog-te-gadget {
        color: transparent !important;
        font-size: 0 !important;
      }

      /* Prevent the page from jumping down 40px when translating */
      body {
        top: 0px !important;
        position: static !important;
      }

      /* Hide the translation tooltip when hovering over text */
      #goog-gt-tt,
      .goog-te-balloon-frame {
        display: none !important;
        visibility: hidden !important;
      }

      .goog-text-highlight {
        background-color: transparent !important;
        box-shadow: none !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <div id="google_translate_element" style="display: none"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
